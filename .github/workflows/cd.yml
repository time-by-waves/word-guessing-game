name: CD

on:
  workflow_run:
    workflows: ["Docker Build and Publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      image-digest:
        description: 'Docker image digest'
        required: false
        type: string
      image-tags:
        description: 'Docker image tags'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: word-guessing-game

jobs:
  deploy_staging:
    name: "Deploy: Staging"
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.environment == 'staging')
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.image-tags }}" ]; then
            echo "tag=${{ github.event.inputs.image-tags }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:main-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment"
          echo "Using Docker image: ${{ steps.image.outputs.tag }}"
          echo "Build SHA: ${{ github.sha }}"
          # Example deployment commands:
          # docker pull ${{ steps.image.outputs.tag }}
          # docker stop word-game-staging || true
          # docker run -d --name word-game-staging \
          #   -p 3000:3000 \
          #   -e NODE_ENV=staging \
          #   -e DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }} \
          #   -e REDIS_URL=${{ secrets.STAGING_REDIS_URL }} \
          #   ${{ steps.image.outputs.tag }}

  deploy_production:
    name: "Deploy: Production"
    runs-on: ubuntu-latest
    needs: [deploy_staging]
    if: |
      (github.event.workflow_run.conclusion == 'success' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.environment == 'production')
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.image-tags }}" ]; then
            echo "tag=${{ github.event.inputs.image-tags }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:main-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to production
        run: |
          echo "Deploying to production environment"
          echo "Using Docker image: ${{ steps.image.outputs.tag }}"
          echo "Build SHA: ${{ github.sha }}"
          # Example deployment commands:
          # docker pull ${{ steps.image.outputs.tag }}
          # docker stop word-game-prod || true
          # docker run -d --name word-game-prod \
          #   -p 80:3000 \
          #   -e NODE_ENV=production \
          #   -e DATABASE_URL=${{ secrets.PROD_DATABASE_URL }} \
          #   -e REDIS_URL=${{ secrets.PROD_REDIS_URL }} \
          #   ${{ steps.image.outputs.tag }}
