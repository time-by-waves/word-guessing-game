###########################################################
name: CI
###########################################################
on:
  #########################################################
  push:
    #######################################################
    branches: ["main", "develop"]
  #########################################################
  pull_request:
    #######################################################
    branches: ["main"]
###########################################################
env:
  NODE_VERSION: "20.x"
  CACHE_VERSION: "v1" # Still used for Playwright cache
###########################################################
jobs:
  #########################################################
  lint:
    #######################################################
    name: "Validation: Lint Code"
    runs-on: ubuntu-latest
    #######################################################
    steps:
      #####################################################
      - name: Setup Node, Dependencies, and Lint
        uses: ./.github/actions/node-setup.yml
        with:
          node-version: ${{ env.NODE_VERSION }}
          run-lint: true
  #########################################################
  unit_tests:
    #######################################################
    name: "Testing: Unit Tests"
    runs-on: ubuntu-latest
    needs: [lint]
    if: success()
    strategy:
      matrix:
        node-version: ["18.x", "20.x"]
    #######################################################
    steps:
      #####################################################
      - name: Setup Node, Dependencies, and Run Tests
        uses: ./.github/actions/node-setup.yml
        with:
          node-version: ${{ matrix.node-version }}
          run-test: true
          # test-command defaults to 'npm test', which is suitable here
      #####################################################
      - name: Upload test coverage
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      #####################################################
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            coverage/
            junit.xml
  #########################################################
  e2e_tests:
    #######################################################
    name: "Testing: E2E Tests"
    runs-on: ubuntu-latest
    needs: [lint]
    # if: success()
    #######################################################
    services:
      #####################################################
      postgres:
        ###################################################
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: word_game_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      #####################################################
      redis:
        ###################################################
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    #######################################################
    steps:
      #####################################################
      - name: Perform Node Setup and Install Dependencies
        uses: ./.github/actions/node-setup.yml
        with:
          node-version: ${{ env.NODE_VERSION }}
          # run-lint: false (default)
          # run-test: false (default)
      #####################################################
      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ env.CACHE_VERSION }}-
      #####################################################
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      #####################################################
      # TODO: Update the build script to do a real build
      - name: Build application
        run: npm run build --if-present
      #####################################################
      - name: Start application
        run: |
          npm start &
          sleep 10
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/word_game_test
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: test-secret
      #####################################################
      - name: Wait for application health
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:3000/health; do sleep 2; done'
      #####################################################
      - name: Run E2E tests
        run: npm run test:e2e
      #####################################################
      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            e2e/test-results/
            playwright-report/
  #########################################################
  build:
    #######################################################
    name: "Build: Application"
    runs-on: ubuntu-latest
    needs: [unit_tests]
    if: success()
    #######################################################
    steps:
      #####################################################
      - name: Perform Node Setup and Install Dependencies
        uses: ./.github/actions/node-setup.yml
        with:
          node-version: ${{ env.NODE_VERSION }}
          # run-lint: false (default)
          # run-test: false (default)
      #####################################################
      # TODO: Update the build script to do a real build
      - name: Build application # Example build step
        run: npm run build --if-present
###########################################################
# Add other build, package, or upload steps here
# Example:
# - name: Upload build artifact
#   uses: actions/upload-artifact@v4
#   with:
#     name: application-build
#     path: dist/
###########################################################
