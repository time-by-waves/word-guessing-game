name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deployment_target:
        description: "Deployment target"
        required: true
        default: "binarylane"
        type: choice
        options:
          - binarylane
          - azure

env:
  NODE_VERSION: "20.x"
  DOCKER_IMAGE_NAME: word-guessing-game

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run linting
        run: npm run lint

      - name: Run security audit
        run: npm audit --production

      - name: Build application
        run: npm run build --if-present

      - name: Generate version number
        id: version
        run: |
          VERSION=$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            .
            !node_modules
            !.git
            !.github

  deploy-to-binarylane:
    if: github.event.inputs.deployment_target != 'azure'
    needs: test-and-build
    runs-on: ubuntu-latest
    environment:
      name: production-binarylane
      url: https://${{ secrets.BINARYLANE_HOST }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts

      - name: Build Docker image
        run: |
          docker build . -t ${{ env.DOCKER_IMAGE_NAME }}:${{ needs.test-and-build.outputs.version }}
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:${{ needs.test-and-build.outputs.version }} ${{ env.DOCKER_IMAGE_NAME }}:latest

      - name: Save Docker image
        run: |
          docker save ${{ env.DOCKER_IMAGE_NAME }}:latest | gzip > docker-image.tar.gz

      - name: Deploy to Binary Lane VM
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.BINARYLANE_HOST }}
          username: ${{ secrets.BINARYLANE_USERNAME }}
          key: ${{ secrets.BINARYLANE_SSH_KEY }}
          script: |
            # Create deployment directory
            mkdir -p ~/deployments/word-guessing-game
            cd ~/deployments/word-guessing-game

            # Stop existing container
            docker stop word-guessing-game || true
            docker rm word-guessing-game || true

            # Clean up old images
            docker image prune -f

      - name: Copy Docker image to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.BINARYLANE_HOST }}
          username: ${{ secrets.BINARYLANE_USERNAME }}
          key: ${{ secrets.BINARYLANE_SSH_KEY }}
          source: "docker-image.tar.gz"
          target: "~/deployments/word-guessing-game/"

      - name: Load and run Docker container
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.BINARYLANE_HOST }}
          username: ${{ secrets.BINARYLANE_USERNAME }}
          key: ${{ secrets.BINARYLANE_SSH_KEY }}
          script: |
            cd ~/deployments/word-guessing-game

            # Load Docker image
            docker load < docker-image.tar.gz

            # Run new container
            docker run -d \
              --name word-guessing-game \
              --restart unless-stopped \
              -p 80:3000 \
              -e NODE_ENV=production \
              ${{ env.DOCKER_IMAGE_NAME }}:latest

            # Health check
            sleep 10
            curl -f http://localhost || exit 1

            # Clean up
            rm docker-image.tar.gz

  deploy-to-azure:
    if: github.event.inputs.deployment_target == 'azure'
    needs: test-and-build
    runs-on: ubuntu-latest
    environment:
      name: production-azure
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build . -t ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.DOCKER_IMAGE_NAME }}:${{ needs.test-and-build.outputs.version }}
          docker tag ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.DOCKER_IMAGE_NAME }}:${{ needs.test-and-build.outputs.version }} ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.DOCKER_IMAGE_NAME }}:${{ needs.test-and-build.outputs.version }}
          docker push ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.DOCKER_IMAGE_NAME }}:latest

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: word-guessing-game-prod
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          images: ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.DOCKER_IMAGE_NAME }}:latest

  create-release:
    needs: [test-and-build, deploy-to-binarylane, deploy-to-azure]
    if: always() && (needs.deploy-to-binarylane.result == 'success' || needs.deploy-to-azure.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --reverse)
          else
            CHANGELOG=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s" --reverse)
          fi

          # Escape newlines for GitHub Actions
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.test-and-build.outputs.version }}
          release_name: Release v${{ needs.test-and-build.outputs.version }}
          body: |
            ## Changes in this release

            ${{ steps.changelog.outputs.changelog }}

            ## Deployment Information
            - Deployed to: ${{ github.event.inputs.deployment_target || 'binarylane' }}
            - Commit: ${{ github.sha }}
            - Build Date: ${{ needs.test-and-build.outputs.version }}
          draft: false
          prerelease: false

  run-e2e-tests:
    needs: [deploy-to-binarylane, deploy-to-azure]
    if: always() && (needs.deploy-to-binarylane.result == 'success' || needs.deploy-to-azure.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PROD_URL: ${{ github.event.inputs.deployment_target == 'azure' && secrets.AZURE_PROD_URL || secrets.BINARYLANE_URL }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
