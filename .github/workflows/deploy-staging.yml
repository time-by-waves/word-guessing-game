name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: word-guessing-game-staging
  AZURE_WEBAPP_PACKAGE_PATH: "."
  NODE_VERSION: "20.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run linting
        run: npm run lint

      - name: Build application
        run: npm run build --if-present

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build . -t ${{ secrets.AZURE_REGISTRY_URL }}/word-guessing-game:staging-${{ github.sha }}
          docker push ${{ secrets.AZURE_REGISTRY_URL }}/word-guessing-game:staging-${{ github.sha }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}
          images: ${{ secrets.AZURE_REGISTRY_URL }}/word-guessing-game:staging-${{ github.sha }}

      - name: Run smoke tests
        run: |
          npm run test:e2e -- --env=staging
        env:
          STAGING_URL: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
